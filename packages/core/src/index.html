<!doctype html>
<html dir="ltr" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <meta name="ix:legacy-icons" content="false" />
    <title>Stencil Component Starter</title>
    <script type="module" src="./build/siemens-ix.esm.js"></script>
    <script nomodule src="./build/siemens-ix.js"></script>
    <link rel="stylesheet" href="./build/siemens-ix.css" />
    <script type="module">
      import { defineCustomElement } from '/node_modules/@siemens/ix-icons/components/ix-icon.js';
      import { addIcons } from '/node_modules/@siemens/ix-icons/dist/index.js';
      import * as icons from '/node_modules/@siemens/ix-icons/icons/index.mjs';

      defineCustomElement();

      /**
       * Preload all icons at
       */
      addIcons(icons);
    </script>
  </head>
  <body>
    <ix-checkbox-group label="Checkbox group label">
      <ix-checkbox label="Option 1" name="checkbox-1"></ix-checkbox>
      <ix-checkbox label="Option 2" name="checkbox-2"></ix-checkbox>
      <ix-checkbox label="Option 3" name="checkbox-3"></ix-checkbox>
      <ix-checkbox label="Option 4" name="checkbox-4"></ix-checkbox>
      <ix-checkbox label="Option 5" name="checkbox-5"></ix-checkbox>
    </ix-checkbox-group>
  </body>
</html>
