<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chip example</title>
    <link rel="stylesheet" href="./chip.css" />
    <script type="module">
      import { addIcons } from '@siemens/ix-icons';
      import { iconPrint } from '@siemens/ix-icons/icons';
      addIcons({
        iconPrint,
      });
    </script>
  </head>
  <body>
    <div class="chip">
      <div class="chip-column">
        <ix-chip
          icon="print"
          variant="primary"
          outline
          closable
          aria-label="Engineering"
          aria-label-close-button="Remove Engineering"
          >Engineering</ix-chip
        >
        <ix-chip
          icon="print"
          variant="alarm"
          outline
          closable
          aria-label-close-button="Remove Urgent"
          >Urgent</ix-chip
        >
        <ix-chip icon="print" variant="critical" outline>Overdue</ix-chip>
        <ix-chip icon="print" variant="warning" outline>Due soon</ix-chip>
        <ix-chip
          icon="print"
          variant="info"
          outline
          tooltip-text="Click to edit"
          aria-label="In review"
          >In review</ix-chip
        >
        <ix-chip icon="print" variant="success" outline>Completed</ix-chip>
        <ix-chip icon="print" variant="neutral" outline>Draft</ix-chip>
        <ix-chip
          icon="print"
          variant="custom"
          outline
          background="#5C3FD6"
          chip-color="#FFFFFF"
          closable
          aria-label="Project Alpha"
          aria-label-close-button="Remove Project Alpha"
          >Project Alpha</ix-chip
        >
        <ix-chip
          icon="print"
          variant="primary"
          outline
          closable
          aria-label-close-button="Remove Design"
        >
          Design</ix-chip
        >
      </div>
      <div class="chip-column">
        <ix-chip
          icon="print"
          variant="primary"
          closable
          aria-label-close-button="Remove Engineering"
        >
          Engineering</ix-chip
        >
        <ix-chip
          icon="print"
          variant="alarm"
          closable
          aria-label-close-button="Remove Urgent"
          >Urgent</ix-chip
        >
        <ix-chip icon="print" variant="critical">Overdue</ix-chip>
        <ix-chip icon="print" variant="warning">Due soon</ix-chip>
        <ix-chip
          icon="print"
          variant="info"
          tooltip-text="Click to edit"
          aria-label="In review"
          >In review</ix-chip
        >
        <ix-chip icon="print" variant="success">Completed</ix-chip>
        <ix-chip icon="print" variant="neutral">Draft</ix-chip>
        <ix-chip
          variant="custom"
          background="#5C3FD6"
          chip-color="#FFFFFF"
          closable
          aria-label="Project Alpha"
          aria-label-close-button="Remove Project Alpha"
          >Project Alpha</ix-chip
        >
        <ix-chip
          variant="primary"
          closable
          aria-label-close-button="Remove Design"
        >
          Design</ix-chip
        >
      </div>
    </div>

    <script type="module" src="./init.js"></script>
  </body>
</html>
