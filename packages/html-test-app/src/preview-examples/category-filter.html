<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Category filter example</title>
  </head>
  <body>
    <ix-category-filter placeholder="Filter by"></ix-category-filter>

    <script>
      const filterState = [
        { type: 'search', value: 'Custom filter text' },
        {
          type: 'filter',
          category: 'ID_1',
          operand: { key: 'does not equal', label: 'does not equal (≠)', symbol: '≠' },
          value: 'IBM',
        },
      ];

      const categories = [
        { key: 'ID_1', label: 'Vendor', values: ['Apple', 'MS', 'Siemens'] },
        { key: 'ID_2', label: 'Product', values: ['iPhone X', 'Windows', 'APS'] },
      ];

      const categoryFilter = document.querySelector('ix-category-filter');
      categoryFilter.uniqueCategories = true;
      categoryFilter.filterState = filterState;
      categoryFilter.categories = categories;
    </script>
    <script type="module" src="./init.js"></script>
  </body>
</html>
