<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slider validation example</title>
  </head>
  <body>
    <div>
      <ix-slider
        label="Info"
        value="10"
        trace
        info-text="Info text"
        class="ix-info"
      >
        <span slot="label-start">0</span>
        <span slot="label-end">100</span>
      </ix-slider>
    </div>

    <div>
      <ix-slider
        label="Warning"
        value="90"
        trace
        warning-text="Warning text"
        class="ix-warning"
      >
        <span slot="label-start">0</span>
        <span slot="label-end">100</span>
      </ix-slider>
    </div>

    <div>
      <ix-slider
        label="Valid"
        value="10"
        trace
        valid-text="Valid text"
        class="ix-valid"
      >
        <span slot="label-start">0</span>
        <span slot="label-end">100</span>
      </ix-slider>
    </div>

    <div>
      <ix-slider
        label="Invalid"
        value="100"
        trace
        invalid-text="Invalid text"
        class="ix-invalid"
      >
        <span slot="label-start">0</span>
        <span slot="label-end">100</span>
      </ix-slider>
    </div>

    <script type="module" src="./init.js"></script>
  </body>
</html>
