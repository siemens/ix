<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECharts line advanced example</title>
    <link rel="stylesheet" href="./echarts-line-advanced.css" />
    <!-- External resources -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.1/dist/echarts.min.js"></script>
    <!-- External resources -->
  </head>
  <body>
    <div id="main" class="echarts"></div>
    <script type="module" src="./init.js"></script>

    <script type="module">
      import {
        registerTheme,
        getComputedCSSProperty,
        resolveEChartThemeName,
      } from '@siemens/ix-echarts';
      import { themeSwitcher } from '@siemens/ix';

      // Wait for init.js to complete (including theme CSS loading)
      await globalThis.ixInitPromise;

      function initChart(options) {
        const theme = resolveEChartThemeName();
        var myChart = echarts.init(document.querySelector('#main'), theme);
        myChart.setOption(options);

        return myChart;
      }

      const dates = Array.from({ length: 2025 - 2013 }, (_, i) =>
        (2013 + i).toString()
      );

      const stockData = [
        77.67, 82.81, 84.09, 91.75, 118.15, 107.48, 99.36, 93.07, 137.18,
        104.38, 156.48, 168.52,
      ];

      function getOptions() {
        return {
          tooltip: { trigger: 'axis' },
          xAxis: { type: 'category', data: dates },
          yAxis: {
            type: 'value',
            splitLine: { lineStyle: { type: 'dashed' } },
          },
          series: [
            {
              type: 'line',
              data: stockData,
              smooth: true,
              lineStyle: { width: 4, shadowBlur: 10 },
              areaStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                  {
                    offset: 0,
                    color: getComputedCSSProperty('color-primary'),
                  },
                  { offset: 1, color: 'transparent' },
                ]),
              },
              markPoint: {
                data: [
                  { type: 'max', name: 'Max', symbol: 'circle', symbolSize: 60 },
                  { type: 'min', name: 'Min', symbol: 'circle', symbolSize: 60 },
                ],
                label: {
                  fontWeight: 'bold',
                  color: getComputedCSSProperty('color-inv-contrast-text'),
                },
              },
              markLine: {
                data: [{ type: 'average', name: 'Avg' }],
                lineStyle: { type: 'dashed' },
              },
            },
          ],
        };
      }

      // providing echarts is in this case optional
      registerTheme(echarts);

      var myChart = initChart(getOptions());

      const disposer = themeSwitcher.themeChanged.on(() => {
        myChart.dispose();
        myChart = initChart(getOptions());
      });

      window.onresize = function () {
        myChart.resize();
      };

      window.addEventListener('unload', () => {
        disposer.dispose();
      });
    </script>
  </body>
</html>
