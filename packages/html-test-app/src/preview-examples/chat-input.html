<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat input example</title>
    <script type="module">
      import { addIcons } from '@siemens/ix-icons';
      import {
        iconImage,
        iconMicrophone,
        iconPdfDocument,
        iconPlus,
      } from '@siemens/ix-icons/icons';

      addIcons({
        iconImage,
        iconMicrophone,
        iconPdfDocument,
        iconPlus,
      });
    </script>
  </head>
  <body>
    <ix-chat class="chat-example__chat">
      <ix-chat-input
        slot="prompt"
        value="Check open alarms and suggest the next maintenance step."
        placeholder="Ask about asset status..."
        textarea-label="Service assistant prompt"
        max-length="180"
        character-limit="180"
      >
        <ix-chat-prompt-attachment
          slot="attachments"
          file-name="shift_report.pdf"
          icon="pdf-document"
        ></ix-chat-prompt-attachment>
        <ix-icon-button
          slot="start"
          aria-label="Attach file"
          icon="plus"
          size="24"
          variant="subtle-tertiary"
        ></ix-icon-button>
        <ix-icon-button
          slot="end"
          aria-label="Add image"
          icon="image"
          size="24"
          variant="subtle-tertiary"
        ></ix-icon-button>
        <ix-icon-button
          slot="end"
          aria-label="Record voice input"
          icon="microphone"
          size="24"
          variant="subtle-tertiary"
        ></ix-icon-button>
      </ix-chat-input>
    </ix-chat>

    <script type="module" src="./init.js"></script>
    <script type="module">
      await window.ixInitPromise;
    </script>
  </body>
</html>
