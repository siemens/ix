<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat user message example</title>
    <script type="module">
      import { addIcons } from '@siemens/ix-icons';
      import {
        iconCopy,
        iconMoreMenu,
        iconPdfDocument,
        iconPen,
        iconTxtDocument,
      } from '@siemens/ix-icons/icons';

      addIcons({
        iconCopy,
        iconMoreMenu,
        iconPdfDocument,
        iconPen,
        iconTxtDocument,
      });
    </script>
  </head>
  <body>
    <ix-chat class="chat-example__chat">
      <ix-chat-user-message message="Summarize the attached shift report.">
        <ix-chat-attachment
          slot="attachments"
          file-name="shift_report.pdf"
          icon="pdf-document"
          hide-remove-button
        ></ix-chat-attachment>
        <ix-chat-attachment
          slot="attachments"
          file-name="operator_notes.txt"
          icon="txt-document"
          hide-remove-button
        ></ix-chat-attachment>
        <ix-icon-button
          slot="actions"
          aria-label="Copy message"
          icon="copy"
          size="24"
          variant="subtle-tertiary"
        ></ix-icon-button>
        <ix-icon-button
          slot="actions"
          aria-label="Edit message"
          icon="pen"
          size="24"
          variant="subtle-tertiary"
        ></ix-icon-button>
        <ix-icon-button
          slot="actions"
          aria-label="Show more actions"
          icon="more-menu"
          size="24"
          variant="subtle-tertiary"
        ></ix-icon-button>
      </ix-chat-user-message>
    </ix-chat>

    <script type="module" src="./init.js"></script>
    <script type="module">
      await window.ixInitPromise;
    </script>
  </body>
</html>
