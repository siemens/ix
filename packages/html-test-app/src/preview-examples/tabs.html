<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabs example</title>
    <link rel="stylesheet" href="./tabs.css" />
  </head>
  <body>
    <div class="tabs">
      <ix-tabs>
        <ix-tab-item data-tab-id="0">Tab 1</ix-tab-item>
        <ix-tab-item data-tab-id="1">Tab 2</ix-tab-item>
        <ix-tab-item data-tab-id="2">Tab 3</ix-tab-item>
      </ix-tabs>
      <section
        role="tabpanel"
        aria-label="Example content"
        data-tab-content="0"
        class="show"
      >
        Content Tab 1
      </section>
      <section
        role="tabpanel"
        aria-label="Example content"
        data-tab-content="1"
      >
        Content Tab 2
      </section>
      <section
        role="tabpanel"
        aria-label="Example content"
        data-tab-content="2"
      >
        Content Tab 3
      </section>
    </div>

    <script>
      (async function () {
        await window.customElements.whenDefined('ix-tabs');
        const container = document.querySelector('.tabs');
        const tabs = container.querySelectorAll('ix-tab-item[data-tab-id]');
        tabs.forEach((tab) => {
          tab.addEventListener('click', () => {
            const contentList = container.querySelectorAll('[data-tab-content]');
            contentList.forEach((content) => {
              content.classList.toggle('show', content.dataset.tabContent === tab.dataset.tabId);
            });
          });
        });
      })();
    </script>
    <script type="module" src="./init.js"></script>
  </body>
</html>
