<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabs rounded example</title>
    <script type="module">
      import { addIcons } from '@siemens/ix-icons';
      import {
        iconSuccess,
        iconTree,
        iconMaintenance,
        iconSoundLoud,
        iconHierarchy,
        iconCalendarSettings,
      } from '@siemens/ix-icons/icons';

      addIcons({
        iconSuccess,
        iconTree,
        iconMaintenance,
        iconSoundLoud,
        iconHierarchy,
        iconCalendarSettings,
      });
    </script>
  </head>
  <body>
    <ix-tabs rounded>
      <ix-tab-item tab-key="success" icon="success" label="Success"></ix-tab-item>
      <ix-tab-item tab-key="tree" icon="tree" label="Tree" counter="200"></ix-tab-item>
      <ix-tab-item
        tab-key="maintenance"
        icon="maintenance"
        label="Maintenance"
      ></ix-tab-item>
      <ix-tab-item
        tab-key="sound"
        icon="sound-loud"
        label="Sound"
        disabled
        counter="24"
      ></ix-tab-item>
      <ix-tab-item tab-key="hierarchy" icon="hierarchy" label="Hierarchy"></ix-tab-item>
      <ix-tab-item
        tab-key="calendar-settings"
        icon="calendar-settings"
        label="Calendar settings"
        disabled
      ></ix-tab-item>
    </ix-tabs>
    <script type="module" src="./init.js"></script>
  </body>
</html>
