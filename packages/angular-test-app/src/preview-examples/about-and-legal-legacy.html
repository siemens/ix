<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About and legal example</title>
  </head>
  <body>
    <ix-application>
      <ix-application-header>
        <div class="placeholder-logo" slot="logo"></div>
      </ix-application-header>
      <ix-menu>
        <ix-menu-about suppressLegacyTabs>
          <ix-tabs activeTabKey="tab-1">
            <ix-tab-item tabKey="tab-1" label="Tab 1"></ix-tab-item>
            <ix-tab-item tabKey="tab-2" label="Tab 2"></ix-tab-item>
          </ix-tabs>
          <section role="tabpanel" data-tab-content="tab-1">Content 1</section>
          <section role="tabpanel" data-tab-content="tab-2" hidden>Content 2</section>
        </ix-menu-about>
      </ix-menu>
    </ix-application>

    <script>
      (async function () {
        await window.customElements.whenDefined('ix-menu');
        const instance = document.querySelector('ix-menu');
        await instance.toggleAbout(true);
      })();
    </script>
    <script type="module" src="./init.js"></script>
  </body>
</html>
