<ix-chat class="chat-example__chat">
  <ix-chat-user-message message="Summarize the attached shift report.">
    <ix-chat-attachment
      slot="attachments"
      file-name="shift_report.pdf"
      icon="pdf-document"
      hide-remove-button
    ></ix-chat-attachment>
    <ix-chat-attachment
      slot="attachments"
      file-name="operator_notes.txt"
      icon="txt-document"
      hide-remove-button
    ></ix-chat-attachment>
    <ix-icon-button
      slot="actions"
      aria-label="Copy message"
      icon="copy"
      size="24"
      variant="subtle-tertiary"
    ></ix-icon-button>
    <ix-icon-button
      slot="actions"
      aria-label="Edit message"
      icon="pen"
      size="24"
      variant="subtle-tertiary"
    ></ix-icon-button>
    <ix-icon-button
      slot="actions"
      aria-label="Show more actions"
      icon="more-menu"
      size="24"
      variant="subtle-tertiary"
    ></ix-icon-button>
  </ix-chat-user-message>
</ix-chat>
