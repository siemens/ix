<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Application header example</title>
    <script type="module" crossorigin src="../assets/application-header-BQME7AYh.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/global-B8nXsUf-.js">
    <link rel="modulepreload" crossorigin href="../assets/init-DAI7i65D.js">
    <link rel="modulepreload" crossorigin href="../assets/ix-icon.entry-iguB3m6A.js">
    <link rel="modulepreload" crossorigin href="../assets/index-vnsUAEMY.js">
    <link rel="stylesheet" crossorigin href="../assets/global-cdHQkmOG.css">
  </head>
  <body>
    <ix-application-header name="My Application">
      <div class="placeholder-logo" slot="logo"></div>

      <ix-icon-button
        aria-label="Button 1"
        variant="tertiary"
        icon="checkboxes"
      ></ix-icon-button>
      <ix-icon-button
        aria-label="Button 2"
        variant="tertiary"
        icon="checkboxes"
      ></ix-icon-button>
      <ix-icon-button
        aria-label="Button 3"
        variant="tertiary"
        icon="checkboxes"
      ></ix-icon-button>

      <ix-dropdown-button variant="subtle-tertiary" label="Select config">
        <ix-dropdown-item label="Config 1"></ix-dropdown-item>
        <ix-dropdown-item label="Config 2"></ix-dropdown-item>
        <ix-dropdown-item label="Config 3"></ix-dropdown-item>
      </ix-dropdown-button>

      <ix-avatar
        aria-label="John Doe"
        username="John Doe"
        extra="Administrator"
      >
        <ix-dropdown-item label="Action 1"></ix-dropdown-item>
        <ix-dropdown-item label="Action 2"></ix-dropdown-item>
      </ix-avatar>
    </ix-application-header>
  </body>
</html>
