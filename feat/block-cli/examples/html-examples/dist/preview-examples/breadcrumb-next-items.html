<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breadcrumb next items example</title>
    <script type="module" crossorigin src="../assets/global-C8IWpzMv.js"></script>
    <script type="module" crossorigin src="../assets/init-CVkHVy98.js"></script>
    <link rel="stylesheet" crossorigin href="../assets/global-cdHQkmOG.css">
  </head>
  <body>
    <ix-breadcrumb>
      <ix-breadcrumb-item
        label="Item 1"
        breadcrumb-key="item-1"
      ></ix-breadcrumb-item>
      <ix-breadcrumb-item
        label="Item 2"
        breadcrumb-key="item-2"
      ></ix-breadcrumb-item>
      <ix-breadcrumb-item
        label="Item 3"
        breadcrumb-key="item-3"
      ></ix-breadcrumb-item>
    </ix-breadcrumb>

    <script>
      const instance = document.querySelector('ix-breadcrumb');
      instance.nextItems = [
        { label: 'Next Item 1', breadcrumbKey: 'next-item-1' },
      ];
    </script>
  </body>
</html>
