<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input legacy readonly example</title>
    <script type="module" crossorigin src="../assets/global-X6m21_-k.js"></script>
    <script type="module" crossorigin src="../assets/init-Bj9jZK19.js"></script>
    <link rel="stylesheet" crossorigin href="../assets/global-Dkj5q-Za.css">
  </head>
  <body>
    <form class="needs-validation">
      <input
        value="Some example text"
        placeholder="Enter text here"
        type="text"
        readonly
        class="ix-form-control"
      />
    </form>

    <script>
      document
        .querySelector('form')
        .addEventListener('submit', (evt) => evt.preventDefault());
    </script>
  </body>
</html>
