<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabs overflow example</title>
    <script type="module" crossorigin src="../assets/tabs-overflow-B8GXiwta.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/global-Cr1KQvOo.js">
    <link rel="modulepreload" crossorigin href="../assets/init-DBI3EHNp.js">
    <link rel="stylesheet" crossorigin href="../assets/global-DB-Mu7F1.css">
    <link rel="stylesheet" crossorigin href="../assets/tabs-CcAdORz5.css">
  </head>
  <body>
    <div class="tabs" style="max-width: 340px;">
      <ix-tabs layout="auto">
        <ix-tab-item data-tab-id="overview">Overview</ix-tab-item>
        <ix-tab-item data-tab-id="analytics">Analytics</ix-tab-item>
        <ix-tab-item data-tab-id="events">Events</ix-tab-item>
        <ix-tab-item data-tab-id="automation">Automation</ix-tab-item>
        <ix-tab-item data-tab-id="data-sources">Data Sources</ix-tab-item>
        <ix-tab-item data-tab-id="notifications">Notifications</ix-tab-item>
        <ix-tab-item data-tab-id="history">History</ix-tab-item>
        <ix-tab-item data-tab-id="settings">Settings</ix-tab-item>
      </ix-tabs>
      <section role="tabpanel" aria-label="Example content" data-tab-content="overview" class="show">
        Content Overview
      </section>
      <section role="tabpanel" aria-label="Example content" data-tab-content="analytics">
        Content Analytics
      </section>
      <section role="tabpanel" aria-label="Example content" data-tab-content="events">
        Content Events
      </section>
      <section role="tabpanel" aria-label="Example content" data-tab-content="automation">
        Content Automation
      </section>
      <section role="tabpanel" aria-label="Example content" data-tab-content="data-sources">
        Content Data Sources
      </section>
      <section role="tabpanel" aria-label="Example content" data-tab-content="notifications">
        Content Notifications
      </section>
      <section role="tabpanel" aria-label="Example content" data-tab-content="history">
        Content History
      </section>
      <section role="tabpanel" aria-label="Example content" data-tab-content="settings">
        Content Settings
      </section>
    </div>

  </body>
</html>
