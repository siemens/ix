<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon toggle button tertiary example</title>
    <script type="module" crossorigin src="../assets/icon-toggle-button-tertiary-B0KEDULY.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/global-DX2OdaCL.js">
    <link rel="modulepreload" crossorigin href="../assets/init-DRfhtWcZ.js">
    <link rel="modulepreload" crossorigin href="../assets/ix-icon.entry-_0Fdvtev.js">

  <body>
    <div class="button-container">
      <ix-icon-toggle-button
        id="boldButton"
        variant="tertiary"
        icon="text-bold"
        ></ix-icon-toggle-button>
      <ix-icon-toggle-button
        variant="tertiary"
        disabled
        icon="text-italic"
        ></ix-icon-toggle-button
      >
      <ix-icon-toggle-button
        id="underlineButton"
        variant="tertiary"
        icon="text-underline"
        pressed
        ></ix-icon-toggle-button
      >
      <ix-icon-toggle-button variant="tertiary" disabled loading>
      </ix-icon-toggle-button>
    </div>
    <p id="loremIpsum">Lorem ipsum text</p>
  </body>
