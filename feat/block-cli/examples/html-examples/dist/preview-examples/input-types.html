<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input types example</title>
    <script type="module" crossorigin src="../assets/global-CtBDOAVb.js"></script>
    <script type="module" crossorigin src="../assets/init-BauzXIH0.js"></script>
    <link rel="stylesheet" crossorigin href="../assets/global-DAPuJzeH.css">
    <link rel="stylesheet" crossorigin href="../assets/input-types-DIQgOE7S.css">
  </head>
  <body>
    <div>
      <ix-input type="text" label="Username" value="MaxMuster1"></ix-input>
    </div>

    <div>
      <ix-input
        type="email"
        label="Email"
        value="example@example.com"
      ></ix-input>
    </div>

    <div>
      <ix-input
        type="password"
        label="Password"
        placeholder="Enter your password"
        value="1234"
      ></ix-input>
    </div>

    <div>
      <ix-input
        type="tel"
        label="Telephone"
        placeholder="Enter your phone number"
        value="+49 123 456789"
      ></ix-input>
    </div>

    <div>
      <ix-input
        type="url"
        label="URL"
        placeholder="Enter your URL"
        value="https://ix.siemens.io"
      ></ix-input>
    </div>

  </body>
</html>
