<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown submenu example</title>
    <script type="module" crossorigin src="../assets/dropdown-submenu-CjurO6qn.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/global-Cr1KQvOo.js">
    <link rel="modulepreload" crossorigin href="../assets/init-DBI3EHNp.js">
    <link rel="modulepreload" crossorigin href="../assets/ix-icon.entry-B1yyMmqe.js">
    <link rel="modulepreload" crossorigin href="../assets/index-BWsIQ1EH.js">
    <link rel="stylesheet" crossorigin href="../assets/global-DB-Mu7F1.css">
  </head>
  <body>
    <ix-button id="iconTriggerId">Open</ix-button>
    <ix-dropdown trigger="iconTriggerId">
      <ix-dropdown-item id="submenuTrigger" label="Submenu"></ix-dropdown-item>
      <ix-dropdown-item icon="star" label="Item 1"></ix-dropdown-item>
      <ix-dropdown-item icon="document" label="Item 2"></ix-dropdown-item>
      <ix-dropdown-item icon="bulb" label="Item 3"></ix-dropdown-item>
    </ix-dropdown>
    <ix-dropdown trigger="submenuTrigger" placement="right-start">
      <ix-dropdown-item icon="star" label="Item 1"></ix-dropdown-item>
      <ix-dropdown-item icon="document" label="Item 2"></ix-dropdown-item>
    </ix-dropdown>
  </body>
</html>
