  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toast custom example</title>
    <script type="module" crossorigin src="../assets/toast-custom-B-m2oAK1.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/global-C8IWpzMv.js">
    <link rel="modulepreload" crossorigin href="../assets/init-CVkHVy98.js">
    <link rel="modulepreload" crossorigin href="../assets/ix-icon.entry-BTisorGV.js">
    <link rel="modulepreload" crossorigin href="../assets/index-BWsIQ1EH.js">

    <link rel="modulepreload" crossorigin href="../assets/index-8iGKQYNS.js">
    <link rel="stylesheet" crossorigin href="../assets/global-cdHQkmOG.css">
  </head>
  <body>
    <ix-toast-container></ix-toast-container>

    <ix-button id="toastMessageButton">
      Trigger toast with custom message
    </ix-button>

    <ix-button id="toastActionButton">
      Trigger toast with action button
    </ix-button>

    <template id="custom-toast-message">
      <div>This message is from template</div>
    </template>

    <template id="custom-toast-action">
      <ix-button variant="tertiary" icon="undo">Undo</ix-button>
    </template>


    <style>
      ix-button {
        margin-right: 0.5rem;
      }
    </style>
  </body>
</html>
