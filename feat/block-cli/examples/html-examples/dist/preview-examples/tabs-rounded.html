<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabs rounded example</title>
    <script type="module" crossorigin src="../assets/tabs-rounded-C_yiBlYO.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/global-Dfa5QLOG.js">
    <link rel="modulepreload" crossorigin href="../assets/init-BUCeZmFF.js">
    <link rel="modulepreload" crossorigin href="../assets/ix-icon.entry-Tb6zX7EO.js">
    <link rel="modulepreload" crossorigin href="../assets/index-BWsIQ1EH.js">
    <link rel="stylesheet" crossorigin href="../assets/global-BlKxImya.css">
  </head>
  <body>
    <ix-tabs rounded>
      <ix-tab-item tab-key="success"
        ><ix-icon name="success" aria-label="Success"></ix-icon
      ></ix-tab-item>
      <ix-tab-item tab-key="tree" counter="200"
        ><ix-icon name="tree" aria-label="Tree"></ix-icon
      ></ix-tab-item>
      <ix-tab-item tab-key="maintenance"
        ><ix-icon name="maintenance" aria-label="Maintenance"></ix-icon
      ></ix-tab-item>
      <ix-tab-item tab-key="sound" disabled counter="24"
        ><ix-icon name="sound-loud" aria-label="Sound"></ix-icon
      ></ix-tab-item>
      <ix-tab-item tab-key="hierarchy"
        ><ix-icon name="hierarchy" aria-label="Hierarchy"></ix-icon
      ></ix-tab-item>
      <ix-tab-item tab-key="calendar-settings" disabled
        ><ix-icon
          name="calendar-settings"
          aria-label="Calendar settings"
        ></ix-icon
      ></ix-tab-item>
    </ix-tabs>
  </body>
</html>
