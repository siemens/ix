<div class="viewport">
  <ix-button (click)="openModal()">Open change password modal</ix-button>
</div>

<ng-template #changePasswordModal let-modal>
  <ix-modal>
    <ix-modal-header (closeClick)="modal.dismiss('dismiss payload')">
      Change password
    </ix-modal-header>

    <ix-modal-content class="formContent">
      <ix-input
        label="Current password*"
        type="password"
        [value]="currentPassword"
        (valueChange)="onCurrentPasswordChange($event)"
      ></ix-input>

      <ix-input
        label="New password*"
        type="password"
        [value]="newPassword"
        (valueChange)="onNewPasswordChange($event)"
      ></ix-input>

      <ul class="ruleList" aria-label="Password rules">
        <li *ngFor="let rule of rules" class="ruleItem">
          <span
            [class]="'ruleIcon ' + (rule.isValid ? 'valid' : 'invalid')"
            aria-hidden="true"
          >
            {{ rule.isValid ? '✓' : '✕' }}
          </span>
          <span>{{ rule.label }}</span>
        </li>
      </ul>

      <ix-input
        label="Confirm password*"
        type="password"
        [value]="confirmPassword"
        [class.ix-invalid]="passwordDoesNotMatch"
        [invalidText]="
          passwordDoesNotMatch
            ? 'Confirm password must match new password'
            : null
        "
        (valueChange)="onConfirmPasswordChange($event)"
      ></ix-input>
    </ix-modal-content>

    <ix-modal-footer>
      <ix-button variant="secondary" (click)="modal.dismiss('dismiss payload')">
        Cancel
      </ix-button>
      <ix-button [disabled]="!canSave" (click)="modal.close('close payload')">
        Save
      </ix-button>
    </ix-modal-footer>
  </ix-modal>
</ng-template>
