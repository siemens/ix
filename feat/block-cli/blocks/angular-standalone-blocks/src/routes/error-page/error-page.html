<section class="page" aria-label="404 error page">
  <div class="spacer"></div>

  <div class="content">
    <p class="errorCode">404</p>

    <div class="textContent">
      <h1 class="title">Not found</h1>
      <p class="message">
        Sorry, we're not able to find that page. It may have been deleted or
        moved.
      </p>
    </div>

    <ix-button (click)="goHome()">Go home</ix-button>
  </div>

  <div class="spacer"></div>
</section>
