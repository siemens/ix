<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button loading example</title>
    <script type="module" crossorigin src="../assets/button-loading-CN1UHFDx.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/global-C8IWpzMv.js">
    <link rel="modulepreload" crossorigin href="../assets/init-CVkHVy98.js">
    <link rel="modulepreload" crossorigin href="../assets/ix-icon.entry-BTisorGV.js">
    <link rel="modulepreload" crossorigin href="../assets/index-BWsIQ1EH.js">
    <link rel="stylesheet" crossorigin href="../assets/global-cdHQkmOG.css">
    <link rel="stylesheet" crossorigin href="../assets/button-loading-C1IduXiO.css">
  </head>
  <body>
    <script>
      function toggle(obj) {
        obj.loading = true;

        setTimeout(() => {
          obj.loading = false;
        }, 2500);
      }
    </script>
    <ix-button variant="subtle-primary" onclick="toggle(this)"> Button </ix-button>

    <ix-button variant="subtle-primary" onclick="toggle(this)" icon="star">
      Button
    </ix-button>

    <ix-button
      variant="subtle-primary"
      onclick="toggle(this)"
      icon="star"
      aria-label="Star"
    ></ix-button>

    <ix-icon-button
      variant="subtle-primary"
      onclick="toggle(this)"
      icon="star"
      aria-label="Toggle loading"
    >
    </ix-icon-button>

    <ix-button variant="subtle-primary" loading> Button </ix-button>

    <ix-icon-button
      variant="subtle-primary"
      loading
      icon="star"
      aria-label="Loading action"
    ></ix-icon-button>
  </body>
</html>
