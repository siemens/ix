<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toggle button tertiary example</title>
    <script type="module" crossorigin src="../assets/toggle-button-tertiary-By_JXx6C.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/global-C8IWpzMv.js">
    <link rel="modulepreload" crossorigin href="../assets/init-CVkHVy98.js">
    <link rel="modulepreload" crossorigin href="../assets/ix-icon.entry-BTisorGV.js">
    <link rel="modulepreload" crossorigin href="../assets/index-BWsIQ1EH.js">
    <link rel="stylesheet" crossorigin href="../assets/global-cdHQkmOG.css">
    <link rel="stylesheet" crossorigin href="../assets/toggle-button-primary-Y2SHNDRH.css">
  </head>
  <body>
    <div class="button-container">
      <ix-toggle-button id="boldButton" variant="tertiary" icon="text-bold"
        >Bold</ix-toggle-button
      >
      <ix-toggle-button variant="tertiary" disabled icon="text-italic"
        >Italic</ix-toggle-button
      >
      <ix-toggle-button
        id="underlineButton"
        variant="tertiary"
        icon="text-underline"
        pressed
        >Underline</ix-toggle-button
      >
      <ix-toggle-button variant="tertiary" disabled loading>
        Strikethrough
      </ix-toggle-button>
    </div>
    <p id="loremIpsum">Lorem ipsum text</p>
  </body>
</html>
