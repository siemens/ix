<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pill example</title>
    <script type="module" crossorigin src="../assets/pill-BkBjLvHh.js"></script>
    <link rel="modulepreload" crossorigin href="../assets/global-F68Qu5y3.js">
    <link rel="modulepreload" crossorigin href="../assets/init-BMJ5iqbY.js">
    <link rel="modulepreload" crossorigin href="../assets/ix-icon.entry-CJHUpQ2M.js">
    <link rel="modulepreload" crossorigin href="../assets/index-BWsIQ1EH.js">
    <link rel="stylesheet" crossorigin href="../assets/global-cdHQkmOG.css">
    <link rel="stylesheet" crossorigin href="../assets/pill-DXxFlxnT.css">
  </head>
  <body>
    <ix-pill
      variant="custom"
      pill-color="var(--theme-color-inv-std-text)"
      background="var(--theme-color-dynamic)"
      >Label</ix-pill>

    <ix-pill tooltip-text="Custom tooltip text">Label</ix-pill>
    <ix-pill class="styled">Label</ix-pill>

    <ix-pill icon="star">Label</ix-pill>
    <ix-pill icon="star" aria-label="Featured"></ix-pill>
    <ix-pill icon="star" class="styled">Label</ix-pill>
    <ix-pill variant="primary" outline align-left icon="star" class="styled">Label</ix-pill>

    <ix-pill variant="alarm">Label</ix-pill>
    <ix-pill variant="alarm" class="styled">Label</ix-pill>

    <ix-pill variant="alarm" icon="star">Label</ix-pill>
    <ix-pill variant="alarm" icon="star" class="styled">Label</ix-pill>
    <ix-pill variant="alarm" align-left icon="star" class="styled">
      Label
    </ix-pill>
    <ix-pill icon="star" class="styled-ellipsis-4">Label</ix-pill>
    <ix-pill variant="primary" outline icon="star" class="styled-ellipsis-4">Label</ix-pill>
    <ix-pill class="styled-ellipsis-3">Label</ix-pill>
    <ix-pill variant="primary" outline class="styled-ellipsis-3">Label</ix-pill>
  </body>
</html>
