<!DOCTYPE html>
<html lang="en" data-ix-theme="classic" data-ix-color-schema="system">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECharts line multiple y-axis example</title>
    <link rel="stylesheet" href="./echarts-line-multiple-y-axis.css" />
    <!-- External resources -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.1/dist/echarts.min.js"></script>
    <!-- External resources -->
  </head>
  <body>
    <div id="main" class="echarts"></div>
    <script type="module" src="./init.js"></script>

    <script type="module">
      import {
        getComputedCSSProperty,
        registerTheme,
        resolveEChartThemeName,
      } from '@siemens/ix-echarts';
      import { themeSwitcher } from '@siemens/ix';

      // Wait for init.js to complete (including theme CSS loading)
      await globalThis.ixInitPromise;

      function initChart(options) {
        const theme = resolveEChartThemeName();
        var myChart = echarts.init(document.querySelector('#main'), theme);
        myChart.setOption(options);

        return myChart;
      }

      const months = [
        'Jan',
        'Feb',
        'Mar',
        'Apr',
        'May',
        'Jun',
        'Jul',
        'Aug',
        'Sep',
        'Oct',
        'Nov',
        'Dec',
      ];

      const data = {
        evaporation: months.map(() => (Math.random() * 100).toFixed(2)),
        precipitation: months.map(() => (Math.random() * 200).toFixed(2)),
        temperature: months.map(() => (Math.random() * 30).toFixed(2)),
      };

      function createYAxis(name, position, color, formatter, offset) {
        return {
          type: 'value',
          name: name,
          position: position,
          offset: offset,
          axisLabel: {
            formatter: formatter,
          },
          axisTick: {
            lineStyle: {
              color: color,
            },
          },
          axisLine: {
            lineStyle: {
              color: color,
            },
          },
        };
      }

      function createSeries(name, yAxisIndex, data, color) {
        return {
          name: name,
          type: 'line',
          yAxisIndex: yAxisIndex,
          data: data,
          lineStyle: {
            color: color,
          },
          itemStyle: {
            color: color,
          },
        };
      }

      function getOptions() {
        const themeChartList = Array.from({ length: 17 }, (_, i) =>
          getComputedCSSProperty(`chart-${i + 1}`)
        );

        return {
          tooltip: {
            trigger: 'axis',
            axisPointer: { type: 'cross' },
          },
          grid: {
            right: '20%',
          },
          legend: {
            show: true,
            bottom: '0',
            left: '0',
          },
          xAxis: [
            {
              type: 'category',
              axisTick: { alignWithLabel: true },
              data: months,
            },
          ],
          yAxis: [
            createYAxis(
              'Evaporation',
              'right',
              themeChartList[0],
              '{value} ml'
            ),
            createYAxis(
              'Precipitation',
              'right',
              themeChartList[7],
              '{value} ml',
              80
            ),
            createYAxis(
              'Temperature',
              'left',
              themeChartList[12],
              '{value} °C'
            ),
          ],
          series: [
            createSeries('Evaporation', 0, data.evaporation, themeChartList[0]),
            createSeries(
              'Precipitation',
              1,
              data.precipitation,
              themeChartList[7]
            ),
            createSeries(
              'Temperature',
              2,
              data.temperature,
              themeChartList[12]
            ),
          ],
        };
      }

      // providing echarts is in this case optional
      registerTheme(echarts);

      var myChart = initChart(getOptions());

      const disposer = themeSwitcher.themeChanged.on(() => {
        myChart.dispose();
        myChart = initChart(getOptions());
      });

      window.onresize = function () {
        myChart.resize();
      };

      window.addEventListener('unload', () => {
        disposer.dispose();
      });
    </script>
  </body>
</html>
