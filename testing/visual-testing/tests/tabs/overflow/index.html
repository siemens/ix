<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Stencil Component Starter</title>
  </head>
  <body>
    <style>
      .example {
        width: 50%;
      }
    </style>
    <!-- Overflow with label prop -->
    <div class="example">
      <ix-tabs layout="auto" active-tab-key="tab-1">
        <ix-tab-item tab-key="tab-1" data-tab-id="1" label="Biggest Tab 1"></ix-tab-item>
        <ix-tab-item tab-key="tab-2" data-tab-id="2" label="Biggest Tab 2"></ix-tab-item>
        <ix-tab-item tab-key="tab-3" data-tab-id="3" label="Biggest Tab 3"></ix-tab-item>
        <ix-tab-item tab-key="tab-4" data-tab-id="4" label="Biggest Tab 4"></ix-tab-item>
        <ix-tab-item tab-key="tab-5" data-tab-id="5" label="Biggest Tab 5"></ix-tab-item>
        <ix-tab-item tab-key="tab-6" data-tab-id="6" label="Biggest Tab 6"></ix-tab-item>
        <ix-tab-item tab-key="tab-7" data-tab-id="7" label="Biggest Tab 7"></ix-tab-item>
        <ix-tab-item tab-key="tab-8" data-tab-id="8" label="Biggest Tab 8"></ix-tab-item>
      </ix-tabs>
    </div>
    <script src="./../../utils/test/runtime/main.ts" type="module"></script>
  </body>
</html>
