<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Stencil Component Starter</title>
    <style>
      .test {
        margin-bottom: 2rem;
        width: 50%;
      }
    </style>
    <script type="module">
      import { addIcons } from '@siemens/ix-icons';
      import {
        iconSuccess,
        iconTree,
        iconMaintenance,
        iconHierarchy,
        iconCalendarSettings,
        iconSoundLoud,
      } from '@siemens/ix-icons/icons';

      addIcons({
        iconSuccess,
        iconTree,
        iconMaintenance,
        iconHierarchy,
        iconCalendarSettings,
        iconSoundLoud,
      });
    </script>
  </head>
  <body>
    <!-- Stretched with label prop -->
    <div class="test">
      <ix-tabs layout="stretched" active-tab-key="s-1">
        <ix-tab-item tab-key="s-1" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="s-2" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="s-3" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="s-4" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="s-5" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="s-6" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="s-7" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="s-8" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="s-9" label="Example"></ix-tab-item>
      </ix-tabs>
    </div>

    <!-- Stretched with slot content -->
    <div class="test">
      <ix-tabs layout="stretched" active-tab-key="ss-1">
        <ix-tab-item tab-key="ss-1">Slot Stretched 1</ix-tab-item>
        <ix-tab-item tab-key="ss-2">Slot Stretched 2</ix-tab-item>
        <ix-tab-item tab-key="ss-3">Slot Stretched 3</ix-tab-item>
      </ix-tabs>
    </div>

    <!-- Stretched small icon-only with icon prop -->
    <div class="test">
      <ix-tabs small layout="stretched" active-tab-key="si-1">
        <ix-tab-item tab-key="si-1" icon="success"></ix-tab-item>
        <ix-tab-item tab-key="si-2" icon="tree"></ix-tab-item>
        <ix-tab-item tab-key="si-3" icon="tree"></ix-tab-item>
        <ix-tab-item tab-key="si-4" icon="tree"></ix-tab-item>
        <ix-tab-item tab-key="si-5" icon="tree"></ix-tab-item>
        <ix-tab-item tab-key="si-6" icon="tree"></ix-tab-item>
        <ix-tab-item tab-key="si-7" icon="maintenance"></ix-tab-item>
        <ix-tab-item tab-key="si-8" icon="sound-loud" disabled></ix-tab-item>
        <ix-tab-item tab-key="si-9" icon="hierarchy"></ix-tab-item>
        <ix-tab-item tab-key="si-10" icon="calendar-settings" disabled></ix-tab-item>
      </ix-tabs>
    </div>

    <!-- Stretched top placement with label prop -->
    <div class="test">
      <ix-tabs placement="top" layout="stretched" active-tab-key="st-1">
        <ix-tab-item tab-key="st-1" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="st-2" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="st-3" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="st-4" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="st-5" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="st-6" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="st-7" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="st-8" label="Example"></ix-tab-item>
        <ix-tab-item tab-key="st-9" label="Example"></ix-tab-item>
      </ix-tabs>
    </div>

    <script src="./../../utils/test/runtime/main.ts" type="module"></script>
  </body>
</html>
