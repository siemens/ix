<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Popover hover trigger</title>
  </head>
  <body style="padding: 12rem">
    <ix-button id="trigger">Open</ix-button>
    <ix-popover
      id="popover"
      trigger="trigger"
      placement="top"
      trigger-mode="hover"
      has-spike
      close-on-click-outside
    >
      <ix-popover-header>Hover trigger</ix-popover-header>
      <ix-popover-content>
        Hover to open. Move into the popover to keep it open.
      </ix-popover-content>
    </ix-popover>
    <script src="./../../utils/test/runtime/main.ts" type="module"></script>
  </body>
</html>
