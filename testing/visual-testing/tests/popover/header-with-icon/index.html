<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Popover header with icon</title>
    <script type="module">
      import { addIcons } from '@siemens/ix-icons';
      import { iconInfo } from '@siemens/ix-icons/icons';

      addIcons({ iconInfo });
    </script>
  </head>
  <body style="padding: 12rem">
    <ix-button id="trigger">Open</ix-button>
    <ix-popover id="popover" trigger="trigger" placement="bottom" has-spike>
      <ix-popover-header icon="info" icon-color="color-info">
        Release highlights
        <ix-pill slot="additional-items" variant="info">New</ix-pill>
      </ix-popover-header>
      <ix-popover-content>Header with icon and additional items.</ix-popover-content>
    </ix-popover>
    <script type="module">
      await customElements.whenDefined('ix-popover');
      await document.querySelector('ix-popover')?.showPopover();
    </script>
    <script src="./../../utils/test/runtime/main.ts" type="module"></script>
  </body>
</html>
