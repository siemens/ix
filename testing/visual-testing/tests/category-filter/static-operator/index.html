<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Stencil Component Starter</title>
  </head>
  <body>
    <ix-category-filter static-operand="equals" placeholder="Filter by.."></ix-category-filter>

    <script type="module">
      (async () => {
        await window.customElements.whenDefined('ix-category-filter');
        const categories = [
          {
            key: 'ID_1',
            label: 'Vendor',
            values: ['Apple', 'MS', 'Siemens'],
          },
          {
            key: 'ID_2',
            label: 'Product',
            values: ['iPhone X', 'Windows', 'APS'],
          },
        ];
        const filterState = [
          { type: 'search', value: 'Custom filter text' },
          {
            type: 'filter',
            category: 'ID_1',
            operand: { key: 'equals', label: 'equals (=)', symbol: '=' },
            value: 'IBM',
          },
        ];
        const categoryFilters = document.querySelectorAll('ix-category-filter');
        categoryFilters.forEach((categoryFilter) => {
          categoryFilter.categories = categories;
          categoryFilter.filterState = filterState;
        });
      })();
    </script>
    <script src="./../../utils/test/runtime/main.ts" type="module"></script>
  </body>
</html>
