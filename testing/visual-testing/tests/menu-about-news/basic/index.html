<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Stencil Component Starter</title>
  </head>
  <body>
    <ix-application>
      <ix-application-header></ix-application-header>
      <ix-menu>
        <ix-menu-item>Item 1</ix-menu-item>
        <ix-menu-item>Item 2</ix-menu-item>
        <ix-menu-item>Item 3</ix-menu-item>
        <ix-menu-about suppress-legacy-tabs>
          <ix-tabs active-tab-key="tab1">
            <ix-tab-item label="Tab 1" tab-key="tab1"></ix-tab-item>
            <ix-tab-item label="Tab 2" tab-key="tab2"></ix-tab-item>
          </ix-tabs>
          <section role="tabpanel" data-tab-content="tab1">Content 1</section>
          <section role="tabpanel" data-tab-content="tab2" hidden>
            Content 2
          </section>
        </ix-menu-about>
        <ix-menu-about-news label="What's new" show active-about-tab-key="tab1">
          The global search is now positioned in the top right corner to always
          keep your context in focus. It provides you a new comprehensive result
          list. Each result navigates you directly to the finding.
        </ix-menu-about-news>
        <ix-menu-settings></ix-menu-settings>
      </ix-menu>
    </ix-application>
    <script>
      document.querySelector('ix-application').breakpoints = ['sm', 'md'];
    </script>
    <script src="./../../utils/test/runtime/main.ts" type="module"></script>
  </body>
</html>
