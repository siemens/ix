<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Stencil Component Starter</title>
  </head>
  <body>
    <div style="height: 12rem; width: 100%">
      <ix-tree root="root" id="tree"></ix-tree>
    </div>

    <script>
      (async () => {
        await globalThis.customElements.whenDefined('ix-tree');
        const tree = document.getElementById('tree');
        const context = {
          root: {
            isExpanded: true,
            isSelected: false,
          },
          sample: {
            isExpanded: true,
            isSelected: false,
          },
          'sample-child-1': {
            isExpanded: false,
            isSelected: false,
            isDisabled: true,
          },
        };

        const model = {
          root: {
            id: 'root',
            children: ['sample'],
            hasChildren: true,
            data: { name: '' },
          },
          sample: {
            id: 'sample',
            children: ['sample-child-1', 'sample-child-2'],
            hasChildren: true,
            data: { name: 'Sample' },
          },
          'sample-child-1': {
            id: 'sample-child-1',
            data: { name: 'Sample Child 1' },
            hasChildren: false,
            children: [],
          },
          'sample-child-2': {
            id: 'sample-child-2',
            data: { name: 'Sample Child 2' },
            hasChildren: false,
            children: [],
          },
        };

        tree.model = { ...model };
        tree.context = { ...context };
      })();
    </script>
    <script src="./../../utils/test/runtime/main.ts" type="module"></script>
  </body>
</html>
