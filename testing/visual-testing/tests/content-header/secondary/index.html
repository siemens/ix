<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0"
    />
    <title>Stencil Component Starter</title>
    <style>
      .margin-top {
        margin-top: 0.375rem;
      }

      ix-pill {
        margin-left: 0.25rem;
      }

      .wrap-test-button {
        width: 5rem;
        min-width: 5rem;
        max-width: 5rem;
        height: auto;
      }
    </style>
    <script type="module">
      import { addIcons } from '@siemens/ix-icons';
      import {
        iconPen,
        iconTrashcan,
        iconContextMenu,
        iconInfo,
        iconMoreMenu,
      } from '@siemens/ix-icons/icons';

      addIcons({
        iconPen,
        iconTrashcan,
        iconContextMenu,
        iconInfo,
        iconMoreMenu,
      });
    </script>
  </head>
  <body>
    <ix-content-header
      variant="secondary"
      has-back-button
      header-title="content title"
      header-subtitle="subtitle content"
    >
      <ix-button slot="secondary-actions" variant="tertiary">Button1</ix-button>
      <ix-button slot="secondary-actions" variant="tertiary">Button2</ix-button>
      <ix-button slot="secondary-actions" variant="tertiary">Button3</ix-button>
    </ix-content-header>

    <ix-content-header
      variant="secondary"
      has-back-button
      header-title="content title"
      header-subtitle="subtitle content"
    >
      <ix-pill slot="header" icon="info" class="margin-top">Label</ix-pill>
      <ix-button slot="secondary-actions" variant="tertiary">Button1</ix-button>
      <ix-button slot="secondary-actions" variant="tertiary">Button2</ix-button>
      <ix-button slot="secondary-actions" variant="tertiary">Button3</ix-button>
      <ix-button variant="primary">Important</ix-button>
    </ix-content-header>

    <ix-content-header
      variant="secondary"
      has-back-button
      header-title="This is a very long content title for testing purposes to see how the header handles overflow and wrapping in different scenarios"
      header-subtitle="This is an equally long subtitle meant to test the behavior of the subtitle area when the text exceeds the usual length and needs to be displayed properly without breaking the layout"
    >
      <ix-pill slot="header" icon="info" class="margin-top">Label</ix-pill>
      <ix-button slot="secondary-actions" variant="tertiary" class="wrap-test-button">
        button text wrapping when it is really long
      </ix-button>
      <ix-button slot="secondary-actions" variant="tertiary" class="wrap-test-button">
        button text wrapping when it is really long
      </ix-button>
      <ix-button slot="secondary-actions" variant="tertiary" class="wrap-test-button">
        button text wrapping when it is really long
      </ix-button>
      <ix-button variant="primary">Important</ix-button>
    </ix-content-header>

    <ix-content-header
      variant="secondary"
      header-title="content title"
      header-subtitle="subtitle content"
    >
      <ix-icon-button icon="pen" variant="tertiary" slot="secondary-actions">
        Button1
      </ix-icon-button>
      <ix-icon-button icon="trashcan" variant="tertiary" slot="secondary-actions">
        Button2
      </ix-icon-button>
      <ix-icon-button icon="context-menu" variant="tertiary" slot="secondary-actions">
        Button3
      </ix-icon-button>
    </ix-content-header>

    <ix-content-header
      variant="secondary"
      header-title="content title with a really loooooooooong name name name name name name name name name name name name"
      header-subtitle="subtitle content  with a really loooooooooong name name name name name name name name name name name name"
    ></ix-content-header>

    <ix-content-header
      variant="secondary"
      header-title="content title"
    ></ix-content-header>

    <script src="./../../utils/test/runtime/main.ts" type="module"></script>
  </body>
</html>
